name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/leads
          META_VERIFY_TOKEN: test-verify-token
          META_APP_SECRET: test-app-secret
          N8N_WEBHOOK_URL: http://localhost:9999/webhook
          N8N_INTERNAL_AUTH_TOKEN: test-n8n-token
          ADMIN_API_KEY: test-admin-key
          BACKEND_API_KEY: test-api-key
